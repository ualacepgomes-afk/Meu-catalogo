    <main id="catalogo" class="max-w-7xl mx-auto px-4 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-10 text-center">
        <p>&copy; 2026 Minha Marca - Todos os direitos reservados.</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://nglucnzkhofiungybxls.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_FJF9Bp0QtxDwLCfR0ApaKw_wyFfcBfR'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const URL_BASE_STORAGE = `${SUPABASE_URL}/storage/v1/object/public/imagens/`;
    
        let produtos = [];
        let filtroAtual = 'Todos';
        let isZoomed = false;

        async function buscarProdutosDoBanco() {
            try {
                const { data, error } = await _supabase.from('produtos').select('*');
                if (error) throw error;
                produtos = data.map(prod => {
                    const imagensBrutas = Array.isArray(prod.lista_imagens) ? prod.lista_imagens : [];
                    const imagensCompletas = imagensBrutas.map(img => 
                        img && !img.startsWith('http') ? URL_BASE_STORAGE + encodeURI(img) : img
                    );
                    return { ...prod, imagens: imagensCompletas };
                });
                renderizarProdutos();
            } catch (err) { console.error("Erro na busca:", err); }
        }
    
        function renderizarProdutos(listaParaExibir = null) {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            const baseProdutos = listaParaExibir ? listaParaExibir : 
                                (filtroAtual === 'Todos' ? produtos : produtos.filter(p => p.categoria === filtroAtual));
    
            if (baseProdutos.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-12 text-gray-500 italic">Nenhum produto encontrado.</p>`;
                return;
            }
    
            grid.innerHTML = baseProdutos.map((prod, index) => {
                const imgPrincipal = prod.imagens && prod.imagens.length > 0 ? prod.imagens[0] : 'https://via.placeholder.com/400';
                let HTMLMiniaturas = '';
                if (prod.imagens && prod.imagens.length > 1) {
                    HTMLMiniaturas = `<div class="flex gap-2 p-4 pb-0 overflow-x-auto">`;
                    prod.imagens.forEach((img, imgIndex) => {
                        const classeBorda = imgIndex === 0 ? 'border-indigo-600' : 'border-gray-200';
                        HTMLMiniaturas += `<img src="${img}" onclick="trocarImagem(this, ${index})" class="miniatura-${index} w-12 h-12 object-cover rounded border-2 ${classeBorda} cursor-pointer transition-all flex-shrink-0">`;
                    });
                    HTMLMiniaturas += `</div>`;
                }
    
                return `
                    <div class="product-card bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 flex flex-col transition-all">
                        <div class="h-80 overflow-hidden bg-gray-100 cursor-zoom-in group relative">
                            <img id="main-img-${index}" src="${imgPrincipal}" onclick="abrirZoom(this.src)" class="w-full h-full object-cover transition-all duration-500 group-hover:scale-105">
                        </div>
                        ${HTMLMiniaturas}
                        <div class="p-6 flex-grow flex flex-col">
                            <span class="text-xs font-bold text-indigo-500 uppercase">${prod.categoria}</span>
                            <h3 class="text-xl font-bold mt-1 text-gray-900">${prod.nome}</h3>
                            <p class="text-gray-600 text-sm mt-2 mb-4">${prod.descricao || ''}</p>
                            <div class="mt-auto">
                                ${prod.preco ? `<p class="text-indigo-600 font-bold text-lg mb-4">R$ ${prod.preco.toFixed(2).replace('.', ',')}</p>` : ''}
                                <a href="https://wa.me/5521999999999?text=${encodeURIComponent('Olá! Tenho interesse na ' + prod.nome)}" target="_blank" class="block w-full bg-green-500 text-white text-center py-3 rounded-lg font-bold hover:bg-green-600 transition shadow-md">Tenho Interesse</a>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }
    
        function filtrar(time) { filtroAtual = time; renderizarProdutos(); }

        function filtrarPorTipo(tipoEscolhido) {
            document.querySelectorAll('.btn-time').forEach(btn => {
                btn.style.display = btn.getAttribute('data-tipo') === tipoEscolhido ? 'inline-block' : 'none';
            });
            const filtrados = produtos.filter(p => p.tipo === tipoEscolhido);
            renderizarProdutos(filtrados);
        }

        function filtrarGeral() {
            document.querySelectorAll('.btn-time').forEach(btn => btn.style.display = 'inline-block');
            filtroAtual = 'Todos';
            renderizarProdutos();
        }
    
        function trocarImagem(elemento, produtoIndex) {
            document.getElementById(`main-img-${produtoIndex}`).src = elemento.src;
            document.querySelectorAll(`.miniatura-${produtoIndex}`).forEach(m => m.classList.replace('border-indigo-600', 'border-gray-200'));
            elemento.classList.replace('border-gray-200', 'border-indigo-600');
        }
    
        // --- LÓGICA DO ZOOM E LUPA ---
        function abrirZoom(src) {
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('img-zoom-modal');
            img.src = src;
            img.classList.remove('zoom-active');
            img.style.transform = 'scale(0.95)';
            img.style.left = '0px'; img.style.top = '0px';
            isZoomed = false;
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.remove('opacity-0', 'pointer-events-none'); img.style.transform = 'scale(1)'; }, 10);
            document.body.style.overflow = 'hidden';
        }
    
        function fecharZoom() {
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('img-zoom-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => { modal.style.display = 'none'; img.classList.remove('zoom-active'); isZoomed = false; }, 300);
            document.body.style.overflow = 'auto';
        }

        // Lupa e Teclado
        document.getElementById('img-zoom-modal').addEventListener('click', function(e) {
            e.stopPropagation();
            isZoomed = !isZoomed;
            this.classList.toggle('zoom-active');
            if (!isZoomed) { this.style.left = '0px'; this.style.top = '0px'; }
        });

        document.getElementById('zoom-modal').addEventListener('mousemove', function(e) {
            if (!isZoomed) return;
            const img = document.getElementById('img-zoom-modal');
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;
            const moveX = (innerWidth / 2 - clientX) * 1.5; 
            const moveY = (innerHeight / 2 - clientY) * 1.5;
            img.style.left = `${moveX}px`; img.style.top = `${moveY}px`;
        });

        document.addEventListener('keydown', (e) => { if (e.key === "Escape") fecharZoom(); });
    
        window.onload = buscarProdutosDoBanco;
    </script>
</body>
